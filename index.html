<!DOCTYPE html>
<html>
    <head>
        <title> My Profile </title>
        <link rel="icon" type="image/png" href="https://img.icons8.com/?size=100&id=wd8b8EcHY1y4&format=png&color=000000">
        <style>
            @font-face {
                    font-family: 'Starborn'; 
                    src: url(Starborn.ttf) format('truetype');
            }
            @font-face {
                    font-family: 'Your-Star' ; 
                    src: url(Your-Star.ttf);
            }
            
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                background-image: url("Blue_pink.jpeg");
                background-size: cover;        
                background-position: center;
                display: flex;

            }
            
            .page-container {
                display: flex;
                flex-direction: column;
                min-height: 100vh;
                width: 100%;
            }
            
            .header {
                text-align: center;
                margin: 30px auto 20px auto;
                width: 100%;
                display: flex;
                justify-content: center;
                align-items: center;
                flex-direction: column;
                padding: 0 20px;
            }
            
            .smooth-box {
                width: auto;
                min-width: 320px;
                max-width: 90%;
                height: auto;
                border-radius: 30px; 
                background: linear-gradient(135deg, #5f99bd 0%, #4a7ea0 100%);
                border: 3px solid #dcecff;
                padding: 16px 40px;
                display: inline-flex;
                align-items: center;
                justify-content: center;
                text-align: center;
                box-sizing: border-box;
                box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
                backdrop-filter: blur(2px);
                transition: all 0.3s ease;
            }
            
            .smooth-box:hover {
                transform: scale(1.02);
                border-color: #ffdefd;
                box-shadow: 0 10px 25px rgba(0, 0, 0, 0.25);
            }
            
            .float {
                display: flex;
                gap: 80px;
                font-family: 'Starborn', sans-serif;
                text-decoration: none;
                color: white;
                flex-wrap: wrap;
                justify-content: center;
                align-items: center;
            }
            
            .float h1 {
                margin: 0;
                line-height: 1;
            }
            
            .float a {
                font-family: 'Starborn', sans-serif;
                text-decoration: none;
                color: rgb(201, 219, 254);
                font-size: 1.8rem;
                transition: all 0.3s ease;
                letter-spacing: 1px;
                display: inline-block;
                position: relative;
            }
            
            .float a.active {
                color: #ffffff;
                text-shadow: 0 0 8px #ffdefd, 0 0 3px rgba(255,255,255,0.8);
                font-weight: bold;
            }
            
            .float a:hover {
                color: #58eefc;
                text-shadow: 0 0 12px #32e3e3;
                transform: translateY(-2px);
            }
            
            .main {
                flex: 1;
                display: flex;
                justify-content: center;
                align-items: center;
                gap: 100px;
                flex-wrap: wrap;
                padding: 40px 20px 60px 20px;
                margin-top: 0px;
            }
            
            .miku-left {
                width: 300px;
                height: 300px;
                object-fit: contain;
                animation: flipANDbeam2 2s ease-in-out infinite;  
                animation-delay: .5s;
                filter: drop-shadow(0 8px 12px rgba(0,0,0,0.2));
            }
            
            .miku-left:hover{
                animation: Shreikleft 1s ease-in-out infinite;
            }
            
            @keyframes flipANDbeam2 {
                0%   { transform: translateY(0) rotateY(0deg); }
                25%  { transform: translateY(-45px) rotateY(-90deg); }
                50%  { transform: translateY(0) rotateY(-180deg); }
                75%  { transform: translateY(-45px) rotateY(-270deg); }
                100% { transform: translateY(0) rotateY(-360deg); }
            }
            
            @keyframes Shreikleft {
                0%   { transform: translateX(0) rotateY(0deg);}
                30%  { transform: rotateY(180deg);}
                35% { transform: translateX(-500px) rotateY(180deg);}
                100% { transform: translateX(0) rotateY(0deg);}
            }
            
            .miku-right {
                width: 300px;
                height: 300px;
                object-fit: contain;
                animation: flipAndBeam 2s ease-in-out infinite;
                filter: drop-shadow(0 8px 12px rgba(0,0,0,0.2));
            }
            
            .miku-right:hover{
                animation: Shreikright 1s ease-in-out infinite;
            }
            
            @keyframes Shreikright {
                0%   { transform: translateX(0) rotateY(0deg);}
                30%  { transform: rotateY(180deg);}
                35% { transform: translateX(500px) rotateY(180deg);}
                100% { transform: translateX(0) rotateY(0deg);}
            }
            
            @keyframes flipAndBeam {
                0%   { transform: translateY(0) rotateY(0deg); }
                25%  { transform: translateY(-45px) rotateY(90deg); }
                50%  { transform: translateY(0) rotateY(180deg); }
                75%  { transform: translateY(-45px) rotateY(270deg); }
                100% { transform: translateY(0) rotateY(360deg); }
            }
            
            .profile {
                width: 250px;
                height: 250px;
                object-fit: cover;
            }
            
            .profile:hover {
                transform: rotateX(360deg) rotateY(180deg) scale(1.3);
                transition: 1.2s;
            }
            
            .footer {
                background: rgba(75, 123, 172, 0.96);
                color: white;
                text-align: center;
                padding: 40px 20px 40px 20px;
                border-top: 5px solid #dcecff;
                width: 100%;
                margin-top: auto;
                box-sizing: border-box;
                backdrop-filter: blur(1px);
                box-shadow: 0 -5px 20px rgba(0,0,0,0.1);
            }
            
            .footer h2 {
                font-family: 'Starborn', cursive;
                font-size: 1.8rem;
                letter-spacing: 1px;
                margin-bottom: 10px;
                color: white;
                text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
                font-weight: normal;
            }
            
            .footer h3 {
                font-family: 'Your-Star', cursive;
                font-size: 1.3rem;
                font-weight: normal;
                color: #bae0ff;
                margin-top: 5px;
                text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
            }
            
            audio {
                position: fixed;
                bottom: 20px;
                left: 20px;
                z-index: 999;
                padding: 5px;
                transition: all 0.3s ease;
            }
            

            

            
            h1, h2, h3, h4, h5, h6 {
                margin: 0;
                font-weight: normal;
            }
            

        </style>
    </head>

    <body>
        <div class="page-container">
            
            <audio controls loop autoplay>
                <source src="Music.mp3" type="audio/mpeg">
                Your browser does not support the audio element.
            </audio>
            
            <div class="header">
                <div class="smooth-box">
                    <div class="float">
                        <h1><a href="index.html" class="active"> HOME </a></h1>
                        <h1><a href="about.html">ABOUT</a></h1>
                        <h1><a href="projects.html">PROJECTS</a></h1>
                    </div>
                </div>
            </div>  
            
            <div class="main">
                <img src="Left-Miku.png" class="miku-left" alt="Left Miku">
                <img src="profile-pic.png" class="profile" alt="Profile Picture">
                <img src="Right-Miku.png" class="miku-right" alt="Right Miku">
            </div>

            <div class="header">
                <div class="smooth-box">
                    <div class="float">
                        <h1>〜(￣▽￣〜) THIS IS MARIAM (〜￣▽￣)〜</h1>
                    </div>
                </div>
            </div> 
            <div class="header">
                <div class="smooth-box">
                    <div class="float">
                        <h3>A STEMer ¯\_(ツ)_/¯</h3>
                    </div>
                </div>
            </div>

            <footer class="footer">
                <h2>Made By Mariam Sayed</h2>
                <h3> Made with Love and a Lot of inspiration</h3>
            </footer>
        </div>
    </body>
</html>
